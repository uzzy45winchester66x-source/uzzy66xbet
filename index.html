<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>uzzy66xbet 💜</title>
    <style>
        body { background: black; color: white; text-align: center; font-family: Arial, sans-serif; padding-top: 50px; }
        input { margin: 5px; padding: 10px; border-radius: 5px; border: none; width: 80%; max-width: 300px; }
        button { background: #8a2be2; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #a042ff; }
        #res { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1 style="color:purple">uzzy66xbet 💜</h1>
    
    <input id="email" type="email" placeholder="Seu e-mail"><br>
    <input id="valor" type="number" placeholder="Valor da aposta"><br>
    <input id="odd" type="number" placeholder="Odd (Ex: 2.0)"><br>

    <button onclick="apostar()">Apostar</button>

    <p id="res"></p>

    <script>
        function apostar() {
            const email = document.getElementById("email").value;
            const valor = document.getElementById("valor").value;
            const odd = document.getElementById("odd").value;
            const res = document.getElementById("res");

            if (!email || !valor || !odd) {
                res.style.color = "yellow";
                res.innerText = "⚠️ Preencha todos os campos!";
                return;
            }

            // Simulação de aposta (Ganha 50% das vezes)
            const ganhou = Math.random() > 0.5;
            
            if (ganhou) {
                const premio = (valor * odd).toFixed(2);
                res.style.color = "#00ff00";
                res.innerText = "✅ VOCÊ GANHOU! R$ " + premio;
            } else {
                res.style.color = "#ff4444";
                res.innerText = "❌ VOCÊ PERDEU! Tente novamente.";
            }
        }
    </script>
</body>
</html>
