<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uzzy Games | Mobile Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #bc13fe; --green: #39ff14; --bg: #050505; --card: #121212; }
        body { background-color: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* HEADER */
        header { text-align: center; padding: 25px; width: 100%; background: linear-gradient(to bottom, #1a0033, transparent); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--green); text-shadow: 0 0 15px var(--green); margin: 0; }
        
        /* CATEGORIAS */
        .section-title { font-family: 'Orbitron'; color: var(--purple); width: 90%; border-left: 4px solid var(--green); padding-left: 12px; margin: 25px 0 15px 0; font-size: 1.1rem; }
        
        /* GRID DE JOGOS */
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 92%; padding-bottom: 20px; }
        
        .game-card { background: var(--card); border-radius: 12px; border: 1px solid #222; overflow: hidden; transition: 0.3s; }
        .game-card:active { transform: scale(0.95); border-color: var(--green); }
        .card-img { width: 100%; height: 100px; background-size: cover; background-position: center; background-color: #222; }
        .card-body { padding: 8px; text-align: center; }
        .card-body h3 { margin: 0; font-size: 0.75rem; font-family: 'Orbitron'; color: #fff; }
        .btn-play { background: var(--purple); border: none; color: white; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 0.7rem; margin-top: 5px; }

        /* PLAYER OVERLAY */
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        .close-bar { background: #111; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--green); }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">UZZY GAMES</h1>
        <p style="color: var(--purple); font-size: 0.8rem;">BEM-VINDO AO MOBILE PORTAL</p>
    </header>

    <h2 class="section-title">🔥 DESTAQUES MOBILE</h2>
    <div class="container">
        <div class="game-card">
            <div class="card-img" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_xN_0-r1e_l9q5Z0XGk9N6e3E5iP8vK6xYA&s');"></div>
            <div class="card-body">
                <h3>Minecraft Mobile</h3>
                <button class="btn-play" onclick="openGame('https://eaglercraft.com/mc/1.8.8/')">JOGAR</button>
            </div>
        </div>
        <div class="game-card">
            <div class="card-img" style="background-image: url('https://voxiom.io/shared/images/voxiom_logo_600.png');"></div>
            <div class="card-body">
                <h3>Voxiom (Tiro)</h3>
                <button class="btn-play" onclick="openGame('https://voxiom.io')">JOGAR</button>
            </div>
        </div>
    </div>

    <h2 class="section-title">🕹️ CLÁSSICOS & RPG</h2>
    <div class="container" id="game-list">
        </div>

    <div id="game-overlay">
        <div class="close-bar">
            <span style="color:var(--green); font-family:'Orbitron'; font-size:0.7rem;">MOBILE ENGINE ACTIVE</span>
            <button onclick="closeGame()" style="background:red; color:white; border:none; padding:5px 12px; border-radius:5px; font-weight:bold;">SAIR [X]</button>
        </div>
        <iframe id="game-box" src="" allow="autoplay; gamepad; fullscreen"></iframe>
    </div>

    <script>
        const games = [
            {n: "Sonic Classic", u: "https://www.retrogames.cc/embed/40212-sonic.html", i: "https://upload.wikimedia.org/wikipedia/pt/8/8d/Sonic_the_Hedgehog_1_capa.png"},
            {n: "Metal Slug", u: "https://www.retrogames.cc/embed/41834-metal-slug.html", i: "https://m.media-amazon.com/images/I/51X57D890BL.jpg"},
            {n: "Super Mario", u: "https://n-gon.github.io/x-mario/", i: "https://mario.wiki.gallery/images/3/3e/SMB_Cloud_Asset.png"},
            {n: "Pigeon RPG", u: "https://itch.io/embed-upload/3762696?color=111111", i: "https://img.itch.zone/aW1nLzU4MDIxNDUucG5n/original/K76I%2Bh.png"},
            {n: "Pac-Man", u: "https://google.com/logos/2010/pacman10-i.html", i: "https://www.google.com/logos/2010/pacman10-hp.png"}
        ];

        function render() {
            const container = document.getElementById('game-list');
            games.forEach(g => {
                container.innerHTML += `
                    <div class="game-card">
                        <div class="card-img" style="background-image: url('${g.i}')"></div>
                        <div class="card-body">
                            <h3>${g.n}</h3>
                            <button class="btn-play" onclick="openGame('${g.u}')">JOGAR</button>
                        </div>
                    </div>`;
            });
            // Preencher com "Em breve" até completar 50
            for(let i=0; i<43; i++) {
                container.innerHTML += `
                    <div class="game-card" style="opacity: 0.4">
                        <div class="card-img"></div>
                        <div class="card-body">
                            <h3>Em breve...</h3>
                            <button class="btn-play" style="background:#444">BLOQUEADO</button>
                        </div>
                    </div>`;
            }
        }

        function openGame(url) {
            document.getElementById('game-box').src = url;
            document.getElementById('game-overlay').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('game-box').src = '';
            document.getElementById('game-overlay').style.display = 'none';
        }

        window.onload = render;
    </script>
</body>
</html>
