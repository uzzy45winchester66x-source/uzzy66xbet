<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Game Hub</title>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: sans-serif; margin: 0; padding: 15px; }
        h2 { border-left: 5px solid #00ff88; padding-left: 10px; font-size: 1rem; margin: 25px 0 12px 0; text-transform: uppercase; color: #00ff88; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 12px; }
        .row-destaque { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        
        .card { background: #161b22; border-radius: 12px; overflow: hidden; position: relative; text-decoration: none; color: white; display: block; border: 1px solid #30363d; }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; min-height: 100px; background: #21262d; }
        
        .card-big { height: 160px; border: 2px solid #00ff88; }
        .card-small { height: 105px; }
        
        .info { position: absolute; bottom: 0; background: rgba(0,0,0,0.8); width: 100%; text-align: center; font-size: 0.6rem; padding: 5px 0; }
        .tag { position: absolute; top: 5px; left: 5px; background: #ff0055; font-size: 0.5rem; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🔥 EM DESTAQUE</h2>
    <div class="row-destaque">
        <a href="https://www.crazygames.com.br/jogos/minecraft-classic" class="card card-big">
            <span class="tag">OFICIAL</span>
            <img src="https://images.crazygames.com/minecraft-classic/20200813134608/minecraft-classic-cover?auto=format%2Ccompress&q=65&cs=strip&ch=DPR&w=422&h=237&fit=crop">
            <div class="info">Minecraft</div>
        </a>
        <a href="https://cryzen.io" class="card card-big">
            <span class="tag">FPS</span>
            <img src="https://images.crazygames.com/cryzen-io/20231121110825/cryzen-io-cover?auto=format%2Ccompress&q=65&cs=strip&ch=DPR&w=422&h=237&fit=crop">
            <div class="info">CS Mobile</div>
        </a>
    </div>

    <h2>🏴‍☠️ ANIME & RPG</h2>
    <div class="grid">
        <a href="https://www.miniplay.com.br/jogo/one-piece-ultimate-fight-1-7" class="card card-small">
            <img src="https://m.media-amazon.com/images/I/81S67Inp3ZL._AC_UF1000,1000_QL80_.jpg">
            <div class="info">One Piece</div>
        </a>
        <a href="https://www.crazygames.com.br/jogos/dynamons-world" class="card card-small">
            <img src="https://images.crazygames.com/dynamons-world/20231018111710/dynamons-world-cover?auto=format%2Ccompress&q=45&cs=strip&ch=DPR&w=215&h=121&fit=crop">
            <div class="info">Dynamons</div>
        </a>
    </div>

    <h2>🏹 ARQUEIROS DE PALITO</h2>
    <div class="grid">
        <a href="https://www.crazygames.com.br/jogos/the-archers-2" class="card card-small">
            <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple116/v4/4c/76/8a/4c768a41-6e3e-63f5-763d-0e31945f0947/AppIcon-0-0-1x_U007emarketing-0-0-0-7-0-0-sRGB-0-0-0-GLES2_U002c0-512MB-85-220-0-10.png/512x512bb.jpg">
            <div class="info">Archers 2</div>
        </a>
        <a href="https://www.crazygames.com.br/jogos/stickman-archero-fight" class="card card-small">
            <img src="https://images.crazygames.com/stickman-archero-fight/20220524103135/stickman-archero-fight-cover?auto=format%2Ccompress&q=45&cs=strip&ch=DPR&w=215&h=121&fit=crop">
            <div class="info">Stick Archero</div>
        </a>
    </div>

    <h2>🕹️ JOGOS SIMPLES</h2>
    <div class="grid">
        <a href="https://www.crazygames.com.br/jogos/google-snake" class="card card-small">
            <img src="https://images.crazygames.com/google-snake/20231123114008/google-snake-cover?auto=format%2Ccompress&q=45&cs=strip&ch=DPR&w=215&h=121&fit=crop">
            <div class="info">Cobrinha</div>
        </a>
        <a href="https://www.crazygames.com.br/jogos/moto-x3m" class="card card-small">
            <img src="https://images.crazygames.com/moto-x3m/20240520101851/moto-x3m-cover?auto=format%2Ccompress&q=45&cs=strip&ch=DPR&w=215&h=121&fit=crop">
            <div class="info">Moto X3M</div>
        </a>
        <a href="https://www.crazygames.com.br/jogos/uno-online" class="card card-small">
            <img src="https://images.crazygames.com/uno-online/20240118091807/uno-online-cover?auto=format%2Ccompress&q=45&cs=strip&ch=DPR&w=215&h=121&fit=crop">
            <div class="info">Uno</div>
        </a>
    </div>

</body>
</html>
