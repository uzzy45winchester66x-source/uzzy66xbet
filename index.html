<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerZone | Premium</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0a0a0a;
            --card-bg: #161616;
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 90px;
        }

        /* Header Estilo App */
        header {
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .logo { font-size: 20px; font-weight: 900; color: var(--primary); font-style: italic; }
        .balance { background: #222; padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; border: 1px solid #333; }

        /* Banner de Destaque */
        .hero {
            width: 92%;
            margin: 15px auto;
            height: 160px;
            background: linear-gradient(45deg, #6200ea, #d32f2f);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background-image: url('https://img.freepik.com/vetores-gratis/fundo-de-videogame-de-neon-retro_23-2148293778.jpg');
            background-size: cover;
            background-blend-mode: overlay;
        }

        .hero h1 { font-size: 22px; margin: 0; text-transform: uppercase; }
        .hero p { font-size: 13px; margin: 5px 0; opacity: 0.9; }

        /* Grade de Jogos */
        .container { width: 92%; margin: 0 auto; }
        h2 { font-size: 18px; margin: 25px 0 15px; font-weight: 700; color: #eee; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #282828;
            transition: 0.3s;
        }

        .game-img {
            width: 100%;
            height: 130px;
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid var(--primary);
        }

        .game-info { padding: 12px; text-align: center; }
        .game-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .play-btn {
            background: var(--primary);
            color: #000;
            text-decoration: none;
            display: block;
            padding: 8px 0;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
            transition: 0.2s;
        }

        .play-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* Menu Inferior Estilo Mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #121212;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #222;
        }

        .nav-item { color: #666; text-decoration: none; font-size: 11px; text-align: center; display: flex; flex-direction: column; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; }

    </style>
</head>
<body>

    <header>
        <div class="logo">GAMER<span>ZONE</span></div>
        <div class="balance">Saldo: R$ 0,00</div>
    </header>

    <div class="hero">
        <p>EVENTO ESPECIAL</p>
        <h1>CONTA VIP ATIVA</h1>
        <small>Aproveite acesso ilimitado</small>
    </div>

    <div class="container">
        <h2>🔥 Jogos Populares</h2>
        <div class="game-grid">
            
            <div class="game-card">
                <div class="game-img" style="background-image: url('https://play-lh.googleusercontent.com/T0_6_fAn4NCas6id4S6Y6Bv9S_65vY8LdfV0V3I-e6zO0XN485V6O6u4Uu6O6o6u4Uu6');"></div>
                <div class="game-info">
                    <div class="game-title">Subway Surfers</div>
                    <a href="https://poki.com.br/g/subway-surfers" class="play-btn">JOGAR</a>
                </div>
            </div>

            <div class="game-card">
                <div class="game-img" style="background-image: url('https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/bcom/pt_BR/games/switch/m/minecraft-switch/hero');"></div>
                <div class="game-info">
                    <div class="game-title">Minecraft Web</div>
                    <a href="https://classic.minecraft.net/" class="play-btn">JOGAR</a>
                </div>
            </div>

            <div class="game-card">
                <div class="game-img" style="background-image: url('https://cdn.omelete.com.br/6S_H-R388fB1_9oXN0u-2_T4R0I=/1200x630/smart/extras/conteudos/among_us_1.jpg');"></div>
                <div class="game-info">
                    <div class="game-title">Among Us Online</div>
                    <a href="https://poki.com.br/g/among-us-online" class="play-btn">JOGAR</a>
                </div>
            </div>

            <div class="game-card">
                <div class="game-img" style="background-image: url('https://play-lh.googleusercontent.com/9v6v-p6v6V6v-p6v6V6v-p6v6V6v-p6v6V6v-p6v6V6v-p6v6V6v-p6v6V6v-p6');"></div>
                <div class="game-info">
                    <div class="game-title">Moto X3M</div>
                    <a href="https://poki.com.br/g/moto-x3m" class="play-btn">JOGAR</a>
                </div>
            </div>

        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><span class="nav-icon">🏠</span>Início</a>
        <a href="#" class="nav-item"><span class="nav-icon">🏆</span>Torneios</a>
        <a href="#" class="nav-item"><span class="nav-icon">💰</span>Carteira</a>
        <a href="#" class="nav-item"><span class="nav-icon">👤</span>Perfil</a>
    </nav>

</body>
</html>
