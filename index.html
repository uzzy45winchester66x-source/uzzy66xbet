<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzzy Games | One Piece Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', Gadget, sans-serif;
            /* Fundo One Piece Estável */
            background: url('https://wallpapercave.com/wp/wp1810625.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            background-color: #111;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px;
            border-bottom: 5px solid #f1c40f;
        }

        .logo-uzzy {
            font-size: 3.5rem;
            color: #f1c40f;
            text-shadow: 4px 4px #c0392b;
            margin: 0;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 30px auto;
        }

        .game-card {
            background: #222;
            border: 3px solid #f1c40f;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            transition: 0.3s;
        }

        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #f1c40f;
        }

        .game-thumb {
            width: 100%;
            height: 150px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .btn-jogar {
            display: block;
            background: #f1c40f;
            color: #000;
            padding: 10px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn-jogar:hover {
            background: #fff;
        }

        .category-title {
            grid-column: 1 / -1;
            font-size: 1.5rem;
            color: #f1c40f;
            border-left: 5px solid #c0392b;
            padding-left: 10px;
        }
    </style>
</head>
<body>

<div class="overlay">
    <header>
        <div>⚓ 🏴‍☠️ 🍖</div>
        <h1 class="logo-uzzy">UZZY GAMES</h1>
        <p>A Grande Era dos Jogos começou!</p>
    </header>

    <div class="game-grid">
        
        <div class="category-title">🎯 Jogos de Arco e Ação</div>
        
        <div class="game-card">
            <div class="game-thumb">🏹</div>
            <p>Ragdoll Throw</p>
            <a href="https://www.crazygames.com/game/ragdoll-throw-challenge" target="_blank" class="btn-jogar">JOGAR AGORA</a>
        </div>
        
        <div class="game-card">
            <div class="game-thumb">🏫</div>
            <p>Monster School</p>
            <a href="https://www.crazygames.com/game/herobrine-vs-monster-school" target="_blank" class="btn-jogar">JOGAR AGORA</a>
        </div>

        <div class="game-card">
            <div class="game-thumb">❤️</div>
            <p>Love Archer</p>
            <a href="https://www.crazygames.com/game/love-archer" target="_blank" class="btn-jogar">JOGAR AGORA</a>
        </div>

        <div class="category-title">🌟 Especiais Uzzy</div>

        <div class="game-card">
            <div class="game-thumb">⛏️</div>
            <p>Minecraft</p>
            <a href="https://classic.minecraft.net" target="_blank" class="btn-jogar">JOGAR AGORA</a>
        </div>

        <div class="game-card">
            <div class="game-thumb">🦔</div>
            <p>Sonic</p>
            <a href="https://poki.com.br/g/sonic-dash" target="_blank" class="btn-jogar">JOGAR AGORA</a>
        </div>

        <div class="game-card">
            <div class="game-thumb">🍄</div>
            <p>Mario</p>
            <a href="https://www.supermario-game.com/" target="_blank" class="btn-jogar">JOGAR AGORA</a>
        </div>

    </div>

    <footer style="text-align: center; margin-top: 50px;">
        <p>Uzzy Games © 2026</p>
    </footer>
</div>

</body>
</html>
