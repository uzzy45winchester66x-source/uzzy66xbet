<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Arcade Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #bc13fe;
            --green: #39ff14;
            --bg: #050505;
            --card: #121212;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animação de Fundo */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0033 0%, transparent 80%);
            z-index: -1;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--green);
            text-shadow: 0 0 10px var(--green), 0 0 20px var(--green);
            margin: 40px 0 10px 0;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.8; text-shadow: 0 0 10px var(--green); }
            to { opacity: 1; text-shadow: 0 0 25px var(--green), 0 0 40px var(--purple); }
        }

        /* Área de Login */
        .auth-section {
            background: rgba(20, 20, 20, 0.8);
            padding: 20px 40px;
            border-radius: 50px;
            border: 1px solid var(--purple);
            box-shadow: 0 0 15px var(--purple);
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .google-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: sans-serif;
            transition: 0.3s;
        }

        .google-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.4);
        }

        /* Grid de Jogos */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1100px;
            padding-bottom: 50px;
        }

        .game-card {
            background: var(--card);
            border-radius: 20px;
            border: 2px solid #222;
            padding: 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            border-color: var(--purple);
            box-shadow: 0 0 30px var(--purple);
            transform: scale(1.05);
        }

        .game-card i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .game-card h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--green);
            margin: 10px 0;
        }

        .btn-play {
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 10px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-play:hover {
            background: var(--green);
            color: black;
            box-shadow: 0 0 20px var(--green);
        }

        .stats {
            font-size: 0.9rem;
            color: #888;
            margin-top: 10px;
        }

        #user-display {
            font-weight: bold;
            color: var(--green);
        }
    </style>
</head>
<body>

    <h1>Neon Arcade</h1>

    <div class="auth-section">
        <span id="status-text">Sincronize sua conta:</span>
        <button class="google-btn" onclick="handleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Entrar com Google
        </button>
        <span id="user-display"></span>
    </div>

    <div class="container">
        <div class="game-card">
            <i>📝</i>
            <h2>STOP!</h2>
            <p>Seja o mais rápido nas categorias.</p>
            <div class="stats">Recorde: <span id="stop-score">0</span> pts</div>
            <button class="btn-play" onclick="play('Stop')">Jogar</button>
        </div>

        <div class="game-card">
            <i>💣</i>
            <h2>BOMBERMAN</h2>
            <p>Derrube os obstáculos e vença.</p>
            <div class="stats">Vitórias: <span id="bomb-score">0</span></div>
            <button class="btn-play" onclick="play('Bomberman')">Jogar</button>
        </div>

        <div class="game-card">
            <i>🍄</i>
            <h2>MARIO BROS</h2>
            <p>Pule, pegue moedas e salve a princesa.</p>
            <div class="stats">Moedas: <span id="mario-score">0</span></div>
            <button class="btn-play" onclick="play('Mario')">Jogar</button>
        </div>
    </div>

    <script>
        // Lógica de Login Simulado
        function handleLogin() {
            const name = prompt("Qual seu nome de usuário?");
            if(name) {
                document.getElementById('status-text').innerText = "Logado como:";
                document.getElementById('user-display').innerText = name;
                alert("Sucesso! Agora suas vitórias serão salvas na nuvem.");
            }
        }

        // Lógica de Jogar (Simulação)
        function play(gameName) {
            alert("Iniciando o engine do " + gameName + "...\nPrepare seus reflexos!");
            
            // Simular ganho de pontos
            if(gameName === 'Mario') {
                let score = document.getElementById('mario-score');
                score.innerText = parseInt(score.innerText) + 10;
            } else if(gameName === 'Bomberman') {
                let score = document.getElementById('bomb-score');
                score.innerText = parseInt(score.innerText) + 1;
            } else {
                let score = document.getElementById('stop-score');
                score.innerText = parseInt(score.innerText) + 50;
            }
        }
    </script>
</body>
</html>
