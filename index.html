<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzzy Games | One Piece Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Papel de parede One Piece no fundo */
            background: url('https://wallpaperaccess.com/full/17351.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        .container {
            background: rgba(0, 0, 0, 0.75); /* Escurece o fundo para destacar os jogos */
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px;
            border-bottom: 4px solid #f1c40f;
            margin-bottom: 30px;
        }

        /* Nome do site decorado */
        .logo-uzzy {
            font-size: 3.5rem;
            color: #f1c40f;
            text-shadow: 4px 4px #c0392b, 0 0 15px #f1c40f;
            margin: 0;
            letter-spacing: 5px;
        }

        .one-piece-icons {
            font-size: 1.5rem;
            color: #fff;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .game-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        /* Efeito ao passar o mouse */
        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #f1c40f;
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.4);
        }

        .game-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .game-card .title {
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .category-title {
            grid-column: 1 / -1;
            font-size: 1.5rem;
            margin-top: 20px;
            border-left: 5px solid #e74c3c;
            padding-left: 15px;
            color: #ecf0f1;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="one-piece-icons">⚓ 🏴‍☠️ 🍖</div>
        <h1 class="logo-uzzy">UZZY GAMES</h1>
        <p>A Grande Era dos Jogos começou!</p>
    </header>

    <div class="game-grid">
        
        <div class="category-title">🎯 Jogos de Arco e Ação (Seus Prints)</div>
        
        <div class="game-card">
            <img src="https://img.crazygames.com/ragdoll-throw-challenge/20220926101135/ragdoll-throw-challenge-cover.png" alt="Ragdoll Throw">
            <div class="title">Ragdoll Throw</div>
        </div>
        
        <div class="game-card">
            <img src="https://img.crazygames.com/herobrine-vs-monster-school/20220914093842/herobrine-vs-monster-school-cover.png" alt="Herobrine vs Monster School">
            <div class="title">Monster School</div>
        </div>

        <div class="game-card">
            <img src="https://img.crazygames.com/love-archer/20230124101532/love-archer-cover.png" alt="Love Archer">
            <div class="title">Love Archer</div>
        </div>

        <div class="game-card">
            <img src="https://img.crazygames.com/archery-master/20220822101532/archery-master-cover.png" alt="Archery Master">
            <div class="title">Archery Master</div>
        </div>

        <div class="game-card">
            <img src="https://img.crazygames.com/stickman-archery/20220822101532/stickman-archery-cover.png" alt="Last Archer">
            <div class="title">Last Archer</div>
        </div>

        <div class="game-card">
            <img src="https://img.crazygames.com/bowman/20220822101532/bowman-cover.png" alt="Bowman">
            <div class="title">Bowman</div>
        </div>

        <div class="category-title">🌟 Favoritos do Uzzy</div>

        <div class="game-card">
            <img src="[attachment_1](attachment)" alt="Minecraft">
            <div class="title">Minecraft World</div>
        </div>

        <div class="game-card">
            <img src="[attachment_0](attachment)" alt="Mario">
            <div class="title">Super Mario Art</div>
        </div>

        <div class="game-card">
            <img src="[attachment_2](attachment)" alt="Sonic">
            <div class="title">Sonic Speed</div>
        </div>

        <div class="game-card">
            <img src="https://img.crazygames.com/noob-vs-pro-boss-item/20220822101532/noob-vs-pro-boss-item-cover.png" alt="Noob vs Monsters">
            <div class="title">Noob VS Monsters</div>
        </div>

    </div>

    <footer style="text-align: center; margin-top: 50px; color: #7f8c8d;">
        <p>Uzzy Games © 2026 - Rumo ao One Piece!</p>
    </footer>
</div>

</body>
</html>
